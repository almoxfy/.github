name: Relato de bug
description: Relate comportamento inesperado neste repositório
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado pelo relato. Antes de enviar, teste a **versão mais recente** ou o **branch padrão**.

  - type: textarea
    id: description
    attributes:
      label: Descreva o bug
      description: Um resumo claro e objetivo do que está errado.
      placeholder: Breve visão geral do problema...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      description: O que deveria ter acontecido?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamento atual
      description: O que aconteceu em vez disso?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Como reproduzir?
      description: |
        Passos ou comandos mínimos. Se o bug envolver arquivos de configuração, use o campo abaixo (oculte segredos).
      placeholder: |
        1. Execute '...'
        2. Configure para '...'
        3. Veja o erro
    validations:
      required: true

  - type: textarea
    id: config_snippet
    attributes:
      label: Config, manifesto ou entrada de exemplo (opcional)
      description: |
        Cole apenas o necessário para reproduzir (ex.: YAML, JSON, trecho de `.env`).
        **Remova segredos, tokens e senhas.**
      render: yaml
      placeholder: |
        # Opcional — apenas se relevante
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### Ambiente
        Prefira colar a saída **completa** de `make debug-info` na raiz do projeto (quando esse target existir).
        Caso contrário, informe **SO**, **versão do Python** e versões das ferramentas envolvidas (ex.: **Kustomize**, **Helm**, **kubectl**, Docker).

  - type: textarea
    id: environment
    attributes:
      label: Detalhes do ambiente
      description: |
        Cole a saída completa de `make debug-info`, **ou** SO, Python, Kustomize/Helm/kubectl (e outras ferramentas relevantes).
      render: bash
      placeholder: "Cole a saída de make debug-info ou liste as versões aqui..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs ou erros relevantes
      description: Erros no console, stack traces ou saída de `make test` (oculte dados sensíveis).
      render: bash
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Autoverificação
      options:
        - label: Removi informações sensíveis dos logs e do material colado.
          required: true
        - label: Reproduzi o problema na versão mais recente ou no branch padrão.
          required: false
