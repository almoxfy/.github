name: Tarefa / Refatoração
description: Melhorias técnicas, documentação ou tarefas de manutenção
body:
  - type: markdown
    attributes:
      value: |
        ### Tarefa técnica
        Use este template para melhorias internas que não alteram necessariamente a funcionalidade para o usuário final.

  - type: dropdown
    id: task_kind
    attributes:
      label: Tipo de tarefa
      description: "Uma label de tipo (type: chore, documentation ou improvement) é aplicada automaticamente a partir desta escolha via Actions neste repositório."
      options:
        - Tarefa / ferramentas / CI
        - Documentação
        - Refatoração / melhoria interna
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: Escopo
      description: Indique brevemente qual módulo, caminho ou área é afetado.
      placeholder: "ex.: Makefile, src/auth.py, .github/workflows"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Descrição
      description: O que exatamente precisa ser feito?
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Justificativa
      description: Por que esta tarefa é necessária? (ex.: desempenho, segurança, qualidade de código)
    validations:
      required: true

  - type: checkboxes
    id: todo
    attributes:
      label: Critérios de aceite / lista de tarefas
      description: O que precisa ser concluído para fechar esta tarefa?
      options:
        - label: Implementação concluída
        - label: Testes atualizados/adicionados (`make test-coverage-ci`)
        - label: Documentação atualizada
    validations:
      required: false

  - type: textarea
    id: debug_info
    attributes:
      label: Informações do ambiente (opcional)
      description: Se esta tarefa depender de detalhes específicos do ambiente, execute `make debug-info` e cole aqui.
      render: text
