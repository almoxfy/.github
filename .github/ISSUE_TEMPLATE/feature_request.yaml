name: Pedido de funcionalidade
description: Sugira uma ideia ou melhoria para um projeto almoxfy
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        ### Obrigado pela sugestão!
        Estamos sempre buscando formas de melhorar nossas ferramentas. Descreva a funcionalidade que você gostaria de ver.

  - type: dropdown
    id: area
    attributes:
      label: Componente alvo
      description: Qual parte do projeto esta funcionalidade afeta?
      options:
        - Motor principal (Python/lógica)
        - CLI / comandos
        - Documentação
        - CI/CD e DevOps
        - Infraestrutura / integrações Kubernetes
        - Outro
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Qual problema você está tentando resolver?
      description: Uma descrição clara e objetiva da fricção ou limitação que você enfrenta.
      placeholder: "Exemplo: sempre me frustro quando preciso sincronizar manualmente..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Descreva a solução proposta
      description: O que deveria acontecer? Como a nova funcionalidade deveria funcionar?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Você considerou alguma solução alternativa ou outra forma de alcançar isso?
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Gostaria de contribuir?
      options:
        - label: Estou disposto a enviar um Pull Request para esta funcionalidade!
