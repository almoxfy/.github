# Aplica uma label `type:*` a partir do dropdown "Tipo de tarefa" em
# `.github/ISSUE_TEMPLATE/task.yaml`. Copie este workflow para outros repositórios
# que usem o mesmo template e labels (ele roda apenas no repositório onde o arquivo existe).

name: Issue — label task by kind

on:
  issues:
    types: [opened]

jobs:
  apply-type-label:
    if: contains(github.event.issue.body, '### Tipo de tarefa')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const header = /^### Tipo de tarefa\s*$/m;
            const hm = body.match(header);
            if (!hm) return;

            const start = hm.index + hm[0].length;
            const slice = body.slice(start);
            const next = slice.search(/\n### /);
            const block = next === -1 ? slice : slice.slice(0, next);
            const lines = block
              .split(/\r?\n/)
              .map((l) => l.trim())
              .filter((l) => l.length > 0);
            const kind = lines[0];
            if (!kind) {
              console.log('::warning::Seção Tipo de tarefa estava vazia');
              return;
            }

            const map = {
              'Tarefa / ferramentas / CI': 'type: chore',
              'Documentação': 'type: documentation',
              'Refatoração / melhoria interna': 'type: improvement',
            };
            const label = map[kind];
            if (!label) {
              console.log(`::warning::Tipo de tarefa desconhecido, nenhuma label mapeada: ${kind}`);
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [label],
            });
