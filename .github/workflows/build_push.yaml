name: Build and Push to Registry

on:
  workflow_call:
    inputs:
      tag:
        required: false
        type: string
        default: "latest"
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile"
      docker_target_stage:
        required: false
        type: string
        default: "production"
      branch:
        required: false
        type: string
        default: ${{ github.ref }}
      dependencies_list_path:
        required: false
        type: string
        default: "/var/audit/python-dependencies.txt"
      min_coverage:
        required: false
        type: string
        default: "90"
      test_command:
        required: false
        type: string
        default: "make test-coverage-ci"
      coverage_prefix:
        required: false
        type: string
        default: "COVERAGE_PERCENT="
      use_docker:
        required: false
        type: boolean
        default: true

jobs:
  test-coverage:
    uses: almoxfy/.github/.github/workflows/test_coverage.yaml@main
    secrets: inherit
    with:
      min_coverage: ${{ inputs.min_coverage }}
      test_command: ${{ inputs.test_command }}
      coverage_prefix: ${{ inputs.coverage_prefix }}
      use_docker: ${{ inputs.use_docker }}
      checkout_ref: ${{ inputs.branch }}

  build-push:
    needs: test-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ env.ENVIRONMENT }}
      image: ${{ env.REGISTRY_URL }}/${{ github.event.repository.name }}/${{ env.ENVIRONMENT }}:${{ env.IMAGE_TAG }}
      tag: ${{ env.IMAGE_TAG }}
      trigger: ${{ env.TRIGGER }}

    steps:
      - name: Set build variables
        run: |
          {
            echo "ENVIRONMENT=prd"
            echo "TRIGGER=${{ github.event_name }}"
            echo "IMAGE_REPO_NAME=${{ github.event.repository.name }}"
            echo "IMAGE_TAG=${{ inputs.tag }}"
            echo "REGISTRY_URL=${{ vars.REGISTRY_URL }}"
            echo "REGISTRY_USERNAME=${{ vars.REGISTRY_USERNAME }}"
            echo "REGISTRY_PASSWORD=${{ secrets.REGISTRY_PASSWORD }}"
            echo "URI_API=${{ vars.URI_API }}"
            echo "URI_DOCS=${{ vars.URI_DOCS }}"
          } >> "$GITHUB_ENV"

      - name: Login to Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          load: ${{ inputs.dependencies_list_path != '' }}
          target: ${{ inputs.docker_target_stage }}
          tags: ${{ env.REGISTRY_URL }}/${{ env.IMAGE_REPO_NAME }}/${{ env.ENVIRONMENT }}:${{ env.IMAGE_TAG }}
          secrets: |
            GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB }}
          build-args: |
            ENVIRONMENT=${{ env.ENVIRONMENT }}
            URI_API=${{ env.URI_API }}
            URI_DOCS=${{ env.URI_DOCS }}

      - name: List dependencies (inside built image)
        id: dependencies_list
        if: inputs.dependencies_list_path != ''
        env:
          DEPS_PATH: ${{ inputs.dependencies_list_path }}
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY_URL}/${IMAGE_REPO_NAME}/${ENVIRONMENT}:${IMAGE_TAG}"
          if docker run --rm --user root -e DEPS_PATH="$DEPS_PATH" --entrypoint /bin/sh "$IMAGE" -c 'test -f "$DEPS_PATH"'; then
            docker run --rm --user root --entrypoint /bin/cat "$IMAGE" "$DEPS_PATH" 2>&1 | tee dependencies-list.txt
            echo "dependencies_list_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "Arquivo de dependências não encontrado em ${DEPS_PATH}; artefato não será enviado." >&2
            echo "dependencies_list_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload dependencies list artifact
        if: inputs.dependencies_list_path != '' && steps.dependencies_list.outputs.dependencies_list_found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dependencies-${{ env.ENVIRONMENT }}-${{ env.IMAGE_TAG }}
          path: dependencies-list.txt
          if-no-files-found: error
