# Labels centralizadas — organização almoxfy
# Manifest: .github/config/labels.yaml
#
# NÃO duplicar o que já existe noutros sítios:
# - Issue fields (Project Almoxfy): Sprint, Epic, Priority
# - Issue types (org): Frontend, Backend, Documentation, DevOps, Misc
#   (Task / Bug / Feature existem na org mas estão desativados → type:* abaixo)

# --- Meta ---

- name: "duplicate"
  color: "cfd3d7"
  description: "Issue ou PR duplicada."

- name: "good first issue"
  color: "7057ff"
  description: "Boa para quem está a começar a contribuir."

- name: "invalid"
  color: "e6e6e6"
  description: "Não parece válido."

- name: "status: help wanted"
  color: "008672"
  description: "Precisa de ajuda da equipa/comunidade."

- name: "status: wontfix"
  color: "ffffff"
  description: "Não será trabalhado."

# --- Tipo (só o que os Issue types ativos não cobrem) ---
# Bug / Feature estão desativados na org; improvement / question não têm Issue type.

- name: "type: bug"
  color: "d73a4a"
  description: "Algo não funciona (Issue type Bug desativado)."

- name: "type: feature"
  color: "0075ca"
  description: "Nova funcionalidade (Issue type Feature desativado)."

- name: "type: improvement"
  color: "78de9b"
  description: "Melhoria sobre algo que já existe."

- name: "type: question"
  color: "d4c5f9"
  description: "Pedido de esclarecimento."

- name: "type: presentation"
  color: "d4c5f9"
  description: "Apresentação do projeto."
